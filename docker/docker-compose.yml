version: '3.9'

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

services:
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    env_file:
      - ../gateway/.env
    networks:
      - public
      - internal
    volumes:
      - ../gateway:/app
    depends_on:
      - user-service

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    env_file:
      - ../services/user-service/.env
    networks:
      - internal
    ports:
      - "3001:3001"
    volumes:
      - ../services/user-service/src:/app/services/user-service/src
    depends_on:
      user-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  user-mongo:
    image: mongo:7
    networks:
      - internal
    volumes:
      - user-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

  product-service:
    build:
      context: ..
      dockerfile: services/product-service/Dockerfile
    env_file:
      - ../services/product-service/.env
    networks:
      - internal
    ports:
      - "3002:3002"
    depends_on:
      product-mongo:
        condition: service_healthy
      user-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  product-mongo:
    image: mongo:7
    networks:
      - internal
    volumes:
      - product-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

  cart-service:
    build:
      context: ..
      dockerfile: services/cart-service/Dockerfile
    env_file:
      - ../services/cart-service/.env
    networks:
      - internal
    depends_on:
      cart-mongo:
        condition: service_healthy
      product-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cart-mongo:
    image: mongo:7
    networks:
      - internal
    volumes:
      - cart-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

  order-service:
    build:
      context: ..
      dockerfile: services/order-service/Dockerfile
    env_file:
      - ../services/order-service/.env
    networks:
      - internal
    depends_on:
      order-mongo:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  order-mongo:
    image: mongo:7
    networks:
      - internal
    volumes:
      - order-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

  payment-service:
    build:
      context: ..
      dockerfile: services/payment-service/Dockerfile
    env_file:
      - ../services/payment-service/.env
    networks:
      - internal
    depends_on:
      payment-mongo:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  payment-mongo:
    image: mongo:7
    networks:
      - internal
    volumes:
      - payment-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  user-mongo-data:
  product-mongo-data:
  cart-mongo-data:
  order-mongo-data:
  payment-mongo-data: