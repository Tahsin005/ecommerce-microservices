version: '3.9'

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

services:
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    env_file:
      - ../gateway/.env
    networks:
      - public
      - internal
    volumes:
      - ../gateway:/app
    depends_on:
      - user-service

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    env_file:
      - ../services/user-service/.env
    networks:
      - internal
    ports:
      - "3001:3001"
    volumes:
      - ../services/user-service/src:/app/services/user-service/src
    depends_on:
      user-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  user-mongo:
    image: mongo:7
    networks:
      - internal
    volumes:
      - user-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  user-mongo-data: